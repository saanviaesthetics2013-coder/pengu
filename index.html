<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pengu AI - Living Assistant</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
</head>

<body>

<div class="sidebar">
  <h2>🐧 Pengu AI</h2>

  <button onclick="showTab('home')">🏠 Home</button>
  <button onclick="showTab('chat')">🤖 Chat</button>
  <button onclick="showTab('translator')">🌐 Translate</button>
  <button onclick="showTab('currency')">💱 Currency</button>
</div>

<div class="main">

  <!-- 3D PENGUIN -->
  <div id="penguin3d"></div>

  <!-- HOME -->
  <div class="tab active" id="home">
    <h1>Hi! I’m Pengu 🐧</h1>
    <p>Your living AI assistant</p>

    <button onclick="startListening()">🎤 Talk to Pengu</button>
  </div>

  <!-- CHAT -->
  <div class="tab" id="chat">
    <h2>Chat with Pengu</h2>

    <div id="chatBox"></div>

    <input id="userInput" placeholder="Ask Pengu...">
    <button onclick="sendMessage()">Send</button>
  </div>

  <!-- TRANSLATOR -->
  <div class="tab" id="translator">
    <h2>Translator</h2>

    <textarea id="text"></textarea>

    <select id="lang">
      <option value="hi">Hindi</option>
      <option value="es">Spanish</option>
      <option value="fr">French</option>
      <option value="de">German</option>
    </select>

    <button onclick="translateText()">Translate</button>
    <p id="output"></p>
  </div>

  <!-- CURRENCY -->
  <div class="tab" id="currency">
    <h2>Currency Converter</h2>

    <input id="amount" type="number" placeholder="INR">

    <select id="country">
      <option value="USD">USD</option>
      <option value="EUR">EUR</option>
      <option value="GBP">GBP</option>
      <option value="JPY">JPY</option>
    </select>

    <button onclick="convertCurrency()">Convert</button>
    <p id="result"></p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
